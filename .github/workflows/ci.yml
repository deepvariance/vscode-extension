name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - name: CLI tests
        run: npm test

      - run: npm ci
        working-directory: extension
      - name: Provider tests (against the built bundle)
        working-directory: extension
        run: npm run build && npm test

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm ci
        working-directory: extension

      # The .vsix is committed and shipped inside the npm tarball, so a stale one is a
      # broken install: npx would hand VS Code an extension older than the source.
      - name: The committed .vsix matches the extension version
        run: |
          version=$(node -p "require('./extension/package.json').version")
          expected="extension/deepvariance-vscode-$version.vsix"
          test -f "$expected" || { echo "::error::$expected is missing — run 'npm run build:extension' and commit it"; exit 1; }
          echo "ok: $expected"

      - name: The npm tarball ships the .vsix
        run: npm pack --dry-run 2>&1 | grep -q '\.vsix' || { echo "::error::npm pack does not include the .vsix"; exit 1; }

      # We publish a bundle, not sources. A stray src/ or sourcemap would put the code back on npm.
      - name: The npm tarball ships no source
        run: |
          npm run build
          listing=$(npm pack --dry-run 2>&1)
          if grep -qE ' (src|bin)/|\.map$' <<<"$listing"; then
            echo "::error::source or sourcemaps leaked into the npm tarball"; echo "$listing"; exit 1
          fi
          echo "ok: bundle only"

      # dist/ is gitignored, so the bundle has to be built before it can be packaged.
      - name: Packaging the extension still works
        working-directory: extension
        run: npm run build && cp ../README.md README.md && npx vsce package --skip-license --out /tmp/check.vsix

  publish:
    needs: [test, package]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # trusted publishing: npm mints a short-lived OIDC token, no secret involved
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org
          cache: npm

      # setup-node ships npm 10.x; trusted publishing needs >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm --version

      - run: npm ci

      # Every commit to main lands here, but only a version bump is a release. Publishing an
      # already-published version is a hard error on npm, so check first and no-op otherwise.
      - name: Is this version already on npm?
        id: check
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already on npm — nothing to do."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "publishing $name@$version"
          fi

      # A trusted publisher cannot be configured for a package that does not exist yet, so the
      # first release has to be bootstrapped by hand. Until that is done and the publisher is
      # registered on npmjs.com, publishing would 404 — so stay green and say what is missing.
      - name: Trusted publishing not configured
        if: steps.check.outputs.published == 'false' && vars.NPM_TRUSTED_PUBLISHING != 'true'
        run: |
          echo "::warning::Nothing published. Bootstrap the package once by hand, register the"
          echo "::warning::trusted publisher on npmjs.com (repo deepvariance/vscode-extension,"
          echo "::warning::workflow ci.yml), then set: gh variable set NPM_TRUSTED_PUBLISHING --body true"

      # No token, no --provenance: OIDC authenticates the run, and npm declines to attest a
      # private repo anyway. Build explicitly — npm validates `bin` before it runs prepack.
      - name: Publish (trusted publishing / OIDC)
        if: steps.check.outputs.published == 'false' && vars.NPM_TRUSTED_PUBLISHING == 'true'
        run: |
          npm run build
          npm publish --access public
